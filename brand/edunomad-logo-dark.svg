      <rect x="40" y="34" width="30" height="14" rx="7"/>
      <rect x="40" y="57" width="40" height="14" rx="7"/>
      <rect x="40" y="80" width="50" height="14" rx="7"/>
    </g>
  </g>
  <text x="122" y="76" font-family="Manrope, 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="800" letter-spacing="-1.8" fill="#faf8f3">EduNomad</text>
</svg>
