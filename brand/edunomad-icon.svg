<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="EduNomad">
  <title>EduNomad</title>
  <!-- Badge: navy rounded square (brand #201f31) -->
  <rect x="6" y="6" width="116" height="116" rx="32" fill="#201f31"/>
  <!-- Monogram "E" as an ascending staircase = growth / learning journey (lime #d8f277) -->
  <g fill="#d8f277">
    <rect x="40" y="34" width="14" height="60" rx="7"/>   <!-- spine -->
    <rect x="40" y="34" width="30" height="14" rx="7"/>   <!-- top arm (short) -->
    <rect x="40" y="57" width="40" height="14" rx="7"/>   <!-- middle arm -->
    <rect x="40" y="80" width="50" height="14" rx="7"/>   <!-- bottom arm (long) -->
  </g>
</svg>
